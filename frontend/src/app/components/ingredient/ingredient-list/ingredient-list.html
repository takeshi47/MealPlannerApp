<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">材料リスト</h2>
  </div>

  <div class="table-responsive bg-white shadow-sm rounded">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th scope="col">材料名</th>
          <th scope="col">在庫あり？</th>
          <th scope="col" class="text-end px-4">操作</th>
        </tr>
      </thead>
      <tbody>
        @for (ingredient of ingredients; track ingredient.id) {
          @if (isEdit(ingredient.id)) {
            <tr
              app-ingredient-form
              [ingredient]="ingredient"
              [csrfToken]="csrfToken"
              (cancelForm)="cancelEditing($event)"
              (complete)="completeEdit($event)"
            ></tr>
          } @else {
            <tr
              app-ingredient-list-item
              [ingredient]="ingredient"
              [csrfToken]="csrfToken"
              (enableEdit)="enableEdit($event)"
            ></tr>
          }
        } @empty {
          <!-- ingredients が空の場合の表示 -->
          <tr>
            <td colspan="3" class="text-center py-5 text-muted">材料が登録されてないよ</td>
          </tr>
        }
        @if (isAdd) {
          <tr
            app-ingredient-form
            [csrfToken]="csrfToken"
            (cancelForm)="cancelAdd()"
            (complete)="completeAdd()"
          ></tr>
        }
        <tr>
          <td colspan="3">
            <button class="btn btn-primary d-block w-100" (click)="enableAdd()">
              新しい材料を登録する
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
