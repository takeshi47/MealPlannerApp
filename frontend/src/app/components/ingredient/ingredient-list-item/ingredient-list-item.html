<td class="px-3">
  {{ ingredient.name }}
</td>
<td>
  @if (ingredient.isStock) {
    <span class="badge bg-success">あり</span>
  } @else {
    <span class="badge bg-secondary">なし</span>
  }
</td>
<td class="text-end px-4">
  <div class="btn-group btn-group-sm">
    <button class="btn btn-outline-secondary" (click)="enableEdit.emit(ingredient.id)">編集</button>
    @if (ingredient.canDelete) {
      <button class="btn btn-outline-danger" (click)="delete()">削除</button>
    }
  </div>
</td>
